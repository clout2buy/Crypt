name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Dependency health
        run: |
          python -m pip check
          python -m pip_audit -r requirements.txt
      - name: Lint
        run: python -m ruff check .
      - name: Import and CLI smoke
        run: |
          python -m compileall -q main.py core tools crypt tests
          python -m crypt --help
      - name: Deterministic eval smoke
        run: |
          python main.py bench --bench-list
          python -m pytest tests/test_target_eval.py tests/test_bench_trace_noninteractive.py -q
      - name: Test
        run: python -m pytest --cov=core --cov=tools --cov-report=term-missing --cov-fail-under=60
      - name: Build package
        run: |
          python -m build
          python -c "import glob, os, subprocess, sys, tempfile; wheels = glob.glob('dist/*.whl'); assert wheels, 'no wheel built'; subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--force-reinstall', wheels[0]]); cwd = tempfile.mkdtemp(); subprocess.check_call([sys.executable, '-m', 'crypt', '--help'], cwd=cwd); subprocess.check_call([sys.executable, '-m', 'crypt', 'bench', '--bench-list'], cwd=cwd)"
